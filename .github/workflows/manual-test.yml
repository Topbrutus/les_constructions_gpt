name: Manual Test

on:
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Exécuter l’orchestrateur minimal
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/orchestrator.py
